name: Deploy – Marcos Justificativa

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─── BUILD ────────────────────────────────────────────────────────────────
  build:
    name: Build do projeto
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        run: npm run build

      - name: Upload do artefato (dist)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─── GITHUB PAGES ─────────────────────────────────────────────────────────
  deploy-github-pages:
    name: Deploy → GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download artefato
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── FIREBASE HOSTING ─────────────────────────────────────────────────────
  deploy-firebase:
    name: Deploy → Firebase Hosting
    needs: build
    runs-on: ubuntu-latest
    # Só roda se o secret FIREBASE_SERVICE_ACCOUNT estiver configurado
    if: ${{ vars.FIREBASE_PROJECT_ID != '' }}
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Download artefato
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy no Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live
